repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^Client\.React/.*\.snap$
      - id: end-of-file-fixer
        exclude: ^Client\.React/.*\.snap$
      - id: check-json
        exclude: (^Client\.React/.*\.snap$|tsconfig.*\.json$)
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
        exclude: \.(mp4|webm|mov|avi|gif)$
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ['--branch', 'main', '--branch', 'dev']

  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        entry: bash -c 'cd Client.React && npm run lint'
        language: system
        pass_filenames: false
        files: ^Client\.React/.*\.[jt]sx?$
      - id: typecheck
        name: TypeScript typecheck
        entry: bash -c 'cd Client.React && npm run typecheck'
        language: system
        pass_filenames: false
        files: ^Client\.React/.*\.[jt]sx?$
